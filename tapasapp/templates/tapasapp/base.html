{% load static %}

<html>
    <head>
        <title>The List</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
        <link rel="stylesheet" href="{% static '/bootstrap/css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="{% static '/bootstrap/css/custom.css' %}">

        <script src="{% static '/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

        <style>
            .sidebar {
                min-height: 100vh;
                background-color: #ffffff;
                padding-top: 1rem;
            }
            .sidebar-link {
                color:  black;
                text-decoration: none;
                font-size: 0.95rem;
            }
            .sidebar ul {
                list-style-type: disc;
                padding-left: 2rem;
            }
            .sidebar-link:hover {
                color: blue;
                text-decoration: underline;
            }
        </style>
        
    </head>
    <body>
        <nav class="navbar navbar-dark mb-3 sticky-top" style="background-color: #590404;">
            <div class="container-fluid">
                <a class="navbar-brand mb-0" href="{% url 'view_menu' %}">My Tapas Menu</span> </a>
                <a href="add_menu" style="color:white"><i class="material-icons">add</i></a>  
            </div>
        </nav>

        <div class="container">
            <div class="row">
                <nav class="col-2 col-lg-2 sidebar">
                    <ul class="nav flex-column">
                        {% block sidebar_links %}
                            <li><a href="#" class="sidebar-link">Home</a></li>
                        {% endblock %}
                    </ul>
                </nav>
                <main class="col-10 ms-sm-auto col-lg-10 py-4"> 
                        {% block content %}
                        {% endblock %}
                </main> 
            </div>
        </div>  
        
        <footer class="footer" style="background-color: #590404;">

            <!-- Copyright -->
            <div class="container">&copy; 2020</div>
            <!-- Copyright -->
          
        </footer>

    </body>
</html>
